<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Sikdorak POS Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
</head>
<body class="bg-[#FBFBFD] text-slate-900 antialiased font-sans">

  <header class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 p-5 flex justify-between items-center">
    <div>
      <h1 class="font-extrabold text-2xl tracking-tighter text-indigo-600">SIKDORAK</h1>
      <p id="infoGarzonHeader" class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest mt-0.5">Esperando selección</p>
    </div>
    <div id="mesaActivaBadge" class="px-5 py-2 rounded-2xl text-[11px] font-extrabold bg-slate-100 text-slate-400 transition-all duration-500 uppercase">
      Sin Mesa
    </div>
  </header>

  <main class="pt-28 pb-40 max-w-lg mx-auto px-6">
    <section class="mb-10">
      <div id="mesasContainer" class="flex gap-5 overflow-x-auto pb-6 scroll-smooth"></div>
    </section>

    <section id="comandasActivasContainer" class="mb-10 hidden">
      <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-4 ml-1">Mesas en Curso</p>
      <div id="listaComandasAbiertas" class="flex gap-3 overflow-x-auto pb-2"></div>
    </section>

    <section id="menu" class="space-y-12">
      <div class="flex justify-center py-20">
        <div class="animate-pulse text-slate-300 font-bold uppercase tracking-tighter">Preparando Carta...</div>
      </div>
    </section>
  </main>

  <button id="btnAbrirComanda" onclick="toggleComanda()" style="display: none;" class="fixed bottom-8 right-6 z-[60] bg-indigo-600 text-white pl-5 pr-6 py-4 rounded-[2rem] shadow-[0_20px_40px_rgba(79,70,229,0.4)] flex items-center gap-4 active:scale-90 transition-all duration-300">
    <div class="relative">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
      </svg>
      <span id="contadorBadge" class="absolute -top-3 -right-3 bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full ring-4 ring-indigo-600">0</span>
    </div>
    <span id="totalFlotante" class="font-extrabold text-lg tracking-tight">$0</span>
  </button>

  <div id="overlay" onclick="toggleComanda()" class="fixed inset-0 bg-slate-900/40 z-[65] hidden backdrop-blur-md transition-opacity duration-300"></div>

  <aside id="panelComanda" class="fixed inset-x-0 bottom-0 z-[70] bg-white rounded-t-[3rem] p-8 max-w-lg mx-auto transform translate-y-full transition-transform duration-500 cubic-bezier(0.32, 0.72, 0, 1)">
    
    <div id="dragHandle" class="w-full py-4 -mt-4 cursor-grab active:cursor-grabbing">
      <div class="w-16 h-1.5 bg-slate-200 rounded-full mx-auto transition-colors hover:bg-slate-300"></div>
    </div>
    
    <div class="flex justify-between items-start mb-8">
      <div>
        <div class="flex items-center gap-2 mb-1">
          <h3 id="pedidoMesaTitulo" class="font-extrabold text-3xl text-slate-900 tracking-tighter">Mesa --</h3>
          <button onclick="toggleComanda()" class="ml-2 bg-slate-100 text-slate-400 p-2 rounded-full hover:bg-slate-200 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <p id="detallesServicio" class="text-xs text-indigo-500 font-bold uppercase tracking-widest opacity-70"></p>
      </div>
      <div class="text-right">
        <p class="text-[10px] font-black text-slate-300 uppercase">Total Cuenta</p>
        <p id="totalCuenta" class="text-3xl font-black text-slate-900 tracking-tighter">$0</p>
      </div>
    </div>

    <ul id="pedidoLista" class="space-y-4 max-h-[35vh] overflow-y-auto pr-2 mb-6"></ul>

    <div class="px-2 mb-6">
        <label class="text-[10px] font-black text-slate-300 uppercase tracking-widest ml-1 mb-2 block">Notas Generales</label>
        <textarea id="notasGenerales" 
            class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm text-slate-700 placeholder:text-slate-300 focus:ring-2 focus:ring-indigo-100 transition-all" 
            placeholder="Ej: Alérgico al maní..."
            rows="2"></textarea>
    </div>

    <button id="enviarBtn" class="w-full bg-indigo-600 text-white font-extrabold py-5 rounded-[2rem] shadow-xl shadow-indigo-100 active:scale-95 transition-all disabled:opacity-30">
      ENVIAR A COCINA
    </button>
  </aside>

  <script src="assets/js/script.js"></script>
</body>
</html>
