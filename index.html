<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Sikdorak POS Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
</head>
<body class="bg-[#F8F9FC] text-slate-900 antialiased font-sans text-base">

  <header class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-xl border-b border-slate-200 p-5 flex justify-between items-center shadow-sm">
    <div>
      <h1 class="font-black text-2xl tracking-tighter text-indigo-700">SIKDORAK</h1>
      <p id="infoGarzonHeader" class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">POS de Cocina</p>
    </div>
    <div id="mesaActivaBadge" class="px-6 py-2.5 rounded-2xl text-xs font-black bg-slate-100 text-slate-400 uppercase transition-all duration-500 shadow-inner">
      Sin Mesa
    </div>
  </header>

  <main class="pt-32 pb-40 max-w-lg mx-auto px-6">
    <section class="mb-12">
      <div id="mesasContainer" class="flex gap-5 overflow-x-auto pb-6 scroll-smooth"></div>
    </section>

    <section id="comandasActivasContainer" class="mb-10 hidden">
      <p class="text-xs font-black text-indigo-600 uppercase tracking-widest mb-4 ml-1">Mesas en Curso</p>
      <div id="listaComandasAbiertas" class="flex gap-3 overflow-x-auto pb-2"></div>
    </section>

    <section id="menu" class="space-y-4"></section>
  </main>

  <button id="btnAbrirComanda" onclick="toggleComanda()" style="display: none;" class="fixed bottom-8 right-6 z-[60] bg-indigo-600 text-white pl-6 pr-8 py-5 rounded-[2.5rem] shadow-[0_20px_40px_rgba(79,70,229,0.4)] flex items-center gap-4 active:scale-90 transition-all border-2 border-indigo-400">
    <div class="relative">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
      </svg>
      <span id="contadorBadge" class="absolute -top-3 -right-3 bg-red-600 text-white text-xs font-black px-2.5 py-1 rounded-full ring-4 ring-indigo-600">0</span>
    </div>
    <span id="totalFlotante" class="font-black text-2xl tracking-tight">$0</span>
  </button>

  <div id="overlay" onclick="toggleComanda()" class="fixed inset-0 bg-slate-900/50 z-[65] hidden backdrop-blur-md"></div>

  <aside id="panelComanda" class="fixed inset-x-0 bottom-0 z-[70] bg-white rounded-t-[3.5rem] p-8 max-w-lg mx-auto transform translate-y-full transition-transform duration-500 border-t-4 border-slate-50 shadow-2xl">
    <div id="dragHandle" class="w-full py-2 -mt-4 mb-4">
      <div class="w-16 h-1.5 bg-slate-200 rounded-full mx-auto shadow-sm"></div>
    </div>
    <div class="flex justify-between items-start mb-8">
      <div class="flex items-center gap-5">
        <button onclick="toggleComanda()" class="bg-indigo-600 text-white p-3.5 rounded-2xl shadow-lg border-b-4 border-indigo-800 active:scale-90 transition-all">
          <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M19 9l-7 7-7-7" /></svg>
        </button>
        <div>
          <h3 id="pedidoMesaTitulo" class="font-black text-3xl text-slate-900 tracking-tighter">Mesa --</h3>
          <p id="detallesServicio" class="text-xs text-indigo-500 font-bold uppercase tracking-widest mt-1"></p>
        </div>
      </div>
      <div class="text-right">
        <p id="totalCuenta" class="text-3xl font-black text-slate-900 tracking-tighter">$0</p>
      </div>
    </div>
    <ul id="pedidoLista" class="space-y-4 max-h-[35vh] overflow-y-auto pr-2 mb-8"></ul>
    <div class="mb-8">
        <textarea id="notasGenerales" oninput="guardarNotaGeneral(this.value)" class="w-full bg-slate-50 border-2 border-slate-100 rounded-3xl p-5 text-base font-semibold text-slate-700 outline-none focus:border-indigo-400 transition-all" placeholder="Notas para Cocina..." rows="2"></textarea>
    </div>
    <button id="enviarBtn" class="w-full bg-green-600 text-white font-black py-6 rounded-[2.5rem] shadow-xl border-b-8 border-green-800 text-lg uppercase active:scale-95 transition-all">ENVIAR A COCINA</button>
  </aside>

  <div id="ticket-impresion">
    <div class="ticket-header">
      <h1 class="ticket-brand">SIKDORAK</h1>
      <p class="ticket-subtitle">COMANDA DE COCINA</p>
      <p class="ticket-divider">********************************</p>
    </div>
    <div class="ticket-info">
      <p id="t-mesa-tipo" class="ticket-bold"></p>
      <p id="t-garzon"></p>
      <p id="t-fecha"></p>
    </div>
    <p class="ticket-divider">--------------------------------</p>
    <div id="t-items-lista"></div>
    <p class="ticket-divider">--------------------------------</p>
    <div id="t-notas-bloque">
      <p class="ticket-bold">NOTAS:</p>
      <p id="t-nota-gral-txt"></p>
    </div>
        <!-- <div id="t-notas-bloque">
          <p id="t-nota-gral-txt"></p>
      </div> -->
    <!-- <div class="ticket-footer">
      <p class="ticket-divider">********************************</p>
      <p style="text-align: center; font-weight: bold;">SIKDORAK POS</p>
      
      <div style="margin-top: 80px;">
          <p style="color: white; font-size: 1px;">.</p> <p>&nbsp;</p> 
          <p>&nbsp;</p>
      </div>
    </div> -->
</div>
</div>

  <script src="assets/js/script.js"></script>
</body>
</html>
