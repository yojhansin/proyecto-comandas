<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sikdorak | Premium POS</title>
    
    <!-- Google Fonts: Inter para modernidad y Playfair para un toque de lujo -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        premium: {
                            gold: '#D4AF37',
                            dark: '#0F172A',
                            accent: '#6366F1'
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-[#F1F5F9] text-slate-900 overflow-x-hidden; }
        }

        /* Glassmorphism Puro */
        .glass-card {
            @apply bg-white/70 backdrop-blur-2xl border border-white/40 shadow-[0_8px_30px_rgb(0,0,0,0.04)];
        }

        /* Animación para el panel de comanda */
        #panelComanda {
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }

        /* Scrollbars elegantes */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { @apply bg-slate-200 rounded-full; }

        /* Estados de Mesas Premium */
        .mesa-vacia { @apply glass-card text-slate-400 opacity-60; }
        .mesa-ocupada { @apply bg-premium-dark text-white shadow-2xl shadow-slate-400 scale-105 z-10; }
        .mesa-preparando { @apply bg-amber-500 text-white shadow-lg shadow-amber-100 scale-105; }
        .mesa-listo { @apply bg-indigo-600 text-white shadow-lg shadow-indigo-100 scale-105; }

        /* Estilo para los botones de cantidad */
        .qty-btn {
            @apply w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 font-bold text-slate-600 transition-all active:scale-90;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Header Minimalista -->
    <header class="fixed top-0 inset-x-0 z-50 px-6 py-4">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <span class="font-display text-3xl text-premium-dark tracking-tighter">Sikdorak</span>
                <div class="h-1 w-8 bg-premium-accent rounded-full"></div>
            </div>
            <div id="statusIndicator" class="glass-card px-4 py-2 rounded-2xl flex items-center gap-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Live Server</span>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-6 pt-24 pb-40">
        
        <!-- Sección de Mesas: Ahora como un Grid elegante -->
        <section class="mb-10">
            <div class="flex justify-between items-end mb-6">
                <h2 class="font-extrabold text-sm uppercase tracking-[0.2em] text-slate-400">Salón Principal</h2>
                <span class="text-xs font-medium text-slate-400" id="countMesas">20 Mesas</span>
            </div>
            <div id="mesasContainer" class="grid grid-cols-4 gap-3">
                <!-- Las mesas se inyectan aquí -->
            </div>
        </section>

        <!-- Mesas que el Garzón está atendiendo (Burbujas) -->
        <section id="comandasActivasContainer" class="mb-10 hidden">
            <h2 class="font-extrabold text-[10px] uppercase tracking-[0.2em] text-indigo-500 mb-4">Mis Atenciones Activas</h2>
            <div id="listaComandasAbiertas" class="flex gap-3 overflow-x-auto pb-2 custom-scroll"></div>
        </section>

        <!-- Menú de Productos -->
        <section>
            <h2 class="font-extrabold text-sm uppercase tracking-[0.2em] text-slate-400 mb-6 italic">Selección de Carta</h2>
            <div id="menu" class="space-y-4">
                <!-- Categorías y productos aquí -->
            </div>
        </section>
    </main>

    <!-- Botón Flotante de Carrito (The Vault) -->
    <div id="btnAbrirComanda" onclick="toggleComanda()" style="display: none;" 
        class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[60] w-[90%] max-w-md">
        <div class="bg-premium-dark text-white p-5 rounded-[2.5rem] flex justify-between items-center shadow-[0_20px_50px_rgba(15,23,42,0.3)] border border-slate-700 active:scale-95 transition-transform cursor-pointer">
            <div class="flex items-center gap-4">
                <div class="relative bg-white/10 w-12 h-12 rounded-2xl flex items-center justify-center">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                    <span id="contadorBadge" class="absolute -top-2 -right-2 bg-indigo-500 text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full ring-2 ring-premium-dark">0</span>
                </div>
                <div>
                    <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Revisar Pedido</p>
                    <p id="mesaActivaBadge" class="text-xs font-bold">Mesa --</p>
                </div>
            </div>
            <p id="totalFlotante" class="text-3xl font-display italic tracking-tighter pr-4">$0</p>
        </div>
    </div>

    <!-- Overlay de Fondo -->
    <div id="overlay" onclick="toggleComanda()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[65] hidden transition-opacity duration-500"></div>

    <!-- Panel Lateral de Comanda (Drawer) -->
    <aside id="panelComanda" class="fixed inset-y-0 right-0 z-[70] w-full max-w-sm bg-white shadow-2xl transform translate-x-full flex flex-col">
        <div class="p-8 flex-1 overflow-y-auto custom-scroll">
            <div class="flex justify-between items-start mb-10">
                <div>
                    <h3 id="pedidoMesaTitulo" class="font-display text-5xl italic text-premium-dark">Mesa --</h3>
                    <p id="detallesServicio" class="text-[10px] font-black uppercase tracking-widest text-indigo-500 mt-2"></p>
                </div>
                <button onclick="toggleComanda()" class="text-slate-300 hover:text-slate-900 transition-colors">
                    <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>

            <div class="mb-10">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6">Detalle de Consumo</p>
                <ul id="pedidoLista" class="space-y-6">
                    <!-- Items de la comanda -->
                </ul>
            </div>

            <div class="mb-10">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-4">Instrucciones Especiales</p>
                <textarea id="notasGenerales" oninput="guardarNotaGeneral(this.value)" 
                    class="w-full h-24 bg-slate-50 rounded-2xl p-4 text-sm font-medium outline-none border border-transparent focus:border-indigo-100 transition-all resize-none" 
                    placeholder="Ej: Sin cebolla, al término..."></textarea>
            </div>
        </div>

        <div class="p-8 bg-slate-50 border-t border-slate-100">
            <div class="flex justify-between items-center mb-6 px-2">
                <span class="text-sm font-bold text-slate-400 uppercase tracking-widest">Total Estimado</span>
                <span id="totalCuenta" class="text-4xl font-display italic text-premium-dark">$0</span>
            </div>
            <button id="enviarBtn" class="w-full bg-premium-dark text-white py-6 rounded-2xl font-bold uppercase tracking-[0.2em] text-xs shadow-xl active:scale-[0.98] transition-all">
                Enviar a Cocina
            </button>
        </div>
    </aside>

    <script src="../assets/js/script.js"></script>
</body>
</html>
